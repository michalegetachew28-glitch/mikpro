services:
  # Express Backend API
  - type: web
    name: garage-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push --accept-data-loss && node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: garage-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: garage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  # Vite React Frontend Static Site
  - type: web
    name: garage-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://garage-backend.onrender.com/api # Replace garage-backend with your actual backend service name on Render
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: garage-db
    plan: free
