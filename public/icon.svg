  <rect x="150" y="270" width="40" height="20" rx="5" fill="#E2E8F0" fill-opacity="0.8"/> <!-- Headlight L -->
  <rect x="322" y="270" width="40" height="20" rx="5" fill="#E2E8F0" fill-opacity="0.8"/> <!-- Headlight R -->

